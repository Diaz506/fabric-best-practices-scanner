name: Publish to PyPI

# Publishes the package to PyPI when you publish a GitHub Release (tag like v0.1.0),
# or when triggered manually. Uses PyPI Trusted Publishing (OIDC) — no API token or
# secret to manage.
#
# One-time setup on PyPI (https://pypi.org):
#   1. Create the project owner account (or org) and verify your email.
#   2. Project -> (create) "fabric-best-practices-scanner".
#   3. Manage -> Publishing -> Add a "pending"/trusted publisher:
#        Owner: Diaz506
#        Repository: fabric-best-practices-scanner
#        Workflow name: publish.yml
#        Environment: pypi
#   Then push a tag / publish a Release named v0.1.0.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
